spring.application.name=hardware-management-api

spring.profiles.active=dev

# On-demand DB backup (POST /api/v1/system/backup) - runs scripts/backup/backup-db.ps1 on the host.
# Only works when this process itself runs on the Windows host with Docker Desktop access.
backup.script.path=${BACKUP_SCRIPT_PATH:scripts/backup/backup-db.ps1}
backup.timeout-seconds=${BACKUP_TIMEOUT_SECONDS:300}

# printer-agent bridge (POST /api/v1/print/*) - this process has no access to the OS print
# spooler, so print/drawer actions are delegated over HTTP to printer-agent running on the
# till PC. See printer-agent/INSTALL.md. Token must match printer-agent's agent.token/AGENT_TOKEN.
printer.agent.url=${PRINTER_AGENT_URL:http://localhost:9977}
printer.agent.token=${PRINTER_AGENT_TOKEN:change-me-shared-secret}
printer.agent.timeout-seconds=${PRINTER_AGENT_TIMEOUT_SECONDS:10}
