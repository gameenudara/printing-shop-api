spring.application.name=hardware-management-api

spring.profiles.active=dev

# On-demand DB backup (POST /api/v1/system/backup) - runs scripts/backup/backup-db.ps1 on the host.
# Only works when this process itself runs on the Windows host with Docker Desktop access.
backup.script.path=${BACKUP_SCRIPT_PATH:scripts/backup/backup-db.ps1}
backup.timeout-seconds=${BACKUP_TIMEOUT_SECONDS:300}
